<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard - Select User</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 2rem; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-viewer { background-color: #6c757d; color: white; }
        .btn-analyst { background-color: #17a2b8; color: white; }
        .btn-admin { background-color: #28a745; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome!</h1>
    <p>Please select your user role to log in:</p>

    <a href="/dashboard" class="btn btn-viewer">Login as Viewer</a>
    <a href="/dashboard" class="btn btn-analyst">Login as Analyst</a>
    <a href="/dashboard" class="btn btn-admin">Login as Admin</a>
</div>

</body>
</html>
